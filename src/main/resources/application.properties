# Application
spring.application.name=questhive
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# WebSocket
spring.websocket.path=/ws


# Super Admin
questhive.superadmin.email=${SUPERADMIN_EMAIL:pallavi@questhive.com}
questhive.superadmin.password=${SUPERADMIN_PASSWORD:Admin@QuestHive2026}
questhive.superadmin.fullname=${SUPERADMIN_FULLNAME:Pallavi Sable}

# hCaptcha
hcaptcha.secret=${HCAPTCHA_SECRET:}
hcaptcha.verify.url=https://hcaptcha.com/siteverify

# Frontend URL
questhive.frontend.url=${FRONTEND_URL:http://localhost:3000}
# Email (Brevo REST API for Render)
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:}

# Dummy mail config — required for JavaMailSender bean to initialize
# Render uses Brevo REST API (brevo.api.key), not SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noop@example.com}
spring.mail.password=${MAIL_PASSWORD:noop}
