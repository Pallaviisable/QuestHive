# Application
spring.application.name=questhive
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# WebSocket
spring.websocket.path=/ws

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# Super Admin
questhive.superadmin.email=${SUPERADMIN_EMAIL:pallavi@questhive.com}
questhive.superadmin.password=${SUPERADMIN_PASSWORD:Admin@QuestHive2026}
questhive.superadmin.fullname=${SUPERADMIN_FULLNAME:Pallavi Sable}

# hCaptcha
hcaptcha.secret=${HCAPTCHA_SECRET:}
hcaptcha.verify.url=https://hcaptcha.com/siteverify

# Frontend URL
questhive.frontend.url=${FRONTEND_URL:http://localhost:3000}